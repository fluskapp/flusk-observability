name: marketplace
basePath: /api/marketplace
entity: MarketplaceListing
auth: optional
operations:
  - method: GET
    path: /
    call: listMarketplace
    description: Browse marketplace listings
  - method: GET
    path: /:id
    call: findMarketplaceListingById
    description: Get listing by ID
  - method: POST
    path: /install
    call: installIntegration
    input: InstallIntegration
    description: Install an integration to a solution
