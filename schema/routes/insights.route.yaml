name: insights
basePath: /api/insights
entity: Insight
auth: optional
operations:
  - method: GET
    path: /
    call: listInsights
    description: List optimization insights
  - method: GET
    path: /:id
    call: findInsightById
    description: Get insight by ID
  - method: PUT
    path: /:id/status
    call: updateInsight
    input: '{"status":"string"}'
    description: Update insight status (accepted/dismissed)
