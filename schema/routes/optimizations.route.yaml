name: optimizations
basePath: /api/optimizations
entity: Optimization
auth: optional
operations:
  - method: GET
    path: /
    call: listOptimizations
    description: List optimization suggestions
  - method: GET
    path: /:id
    call: findOptimizationById
    description: Get optimization by ID
  - method: PUT
    path: /:id/status
    call: updateOptimization
    input: '{"status":"string"}'
    description: Update optimization status
