name: webhook
description: Generic HTTP webhook
type: webhook
config:
  fields:
    - name: url
      type: string
      required: true
      description: Webhook URL (HTTPS required in production)
    - name: headers
      type: json
      description: Custom headers
    - name: method
      type: enum
      values: [POST, PUT]
      default: POST
methods:
  - name: send
    description: Send alert via HTTP
    input: AlertEvent
    http:
      method: "{{config.method}}"
      url: "{{config.url}}"
      headers: "{{config.headers}}"
    template: |
      {
        "alertType": "{{alertType}}",
        "severity": "{{severity}}",
        "title": "{{title}}",
        "message": "{{message}}",
        "timestamp": "{{createdAt}}",
        "metadata": {{json metadata}}
      }
  - name: test
    template: |
      { "test": true, "source": "flusk", "timestamp": "{{now}}" }
