name: purge
description: Delete old observability data
action:
  call: purge
args:
  - name: older-than
    type: string
    required: true
    description: Delete data older than (e.g. 30d, 90d, 1y)
  - name: type
    type: enum
    values:
      - all
      - calls
      - traces
      - patterns
      - insights
      - profiles
    default: all
    description: Type of data to purge
  - name: dry-run
    type: boolean
    default: false
    description: Show what would be deleted without deleting
  - name: confirm
    type: boolean
    default: false
    description: Skip confirmation prompt
