name: scan
description: Scan a codebase for AI/LLM usage (flusk scan ./src)
options:
  - name: path
    type: string
    required: true
    positional: true
    description: Path to scan
  - name: type
    type: enum
    values: [static, runtime, hybrid]
    default: static
    description: Scan type
  - name: output
    type: enum
    values: [table, json, report]
    default: table
    description: Output format
action:
  steps:
    - id: result
      call: scanCodebase
      with:
        projectPath: "$path"
        scanType: "$type"
output:
  format: table
  columns: [projectPath, scanType, totalLlmCalls, totalProviders, totalModels, riskScore, scanDuration]
