name: drift-list
description: List detected drifts
options:
  - name: agent
    type: string
    description: Filter by agent
  - name: severity
    type: enum
    values: [critical, high, medium, low]
    description: Filter by severity
  - name: status
    type: enum
    values: [active, acknowledged, resolved, false-positive]
    default: active
    description: Filter by status
  - name: limit
    type: integer
    default: 20
    description: Max results
action:
  steps:
    - id: result
      action: findMany
      entity: DriftDetection
      where:
        agentLabel: "$agent"
        severity: "$severity"
        status: "$status"
      limit: "$limit"
      orderBy: createdAt desc
output:
  format: table
  columns: [agentLabel, detectionType, severity, driftScore, baselinePeriod, currentPeriod, status]
