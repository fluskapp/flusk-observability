name: export
description: Export observability data to various formats and destinations
options:
  - name: target
    type: enum
    values: [csv, json, grafana, datadog]
    required: true
    description: Export destination
  - name: type
    type: enum
    values: [calls, traces, metrics]
    default: calls
    description: Data type to export
  - name: start
    type: string
    default: "30d-ago"
    description: Start of time range
  - name: end
    type: string
    default: now
    description: End of time range
  - name: output
    type: string
    description: Output file path (for csv/json)
action:
  steps:
    - id: result
      action: condition
      if: { field: $target, op: eq, value: grafana }
      then:
        call: exportToGrafana
        with: { db: $db, client: $grafanaClient, start: $start, end: $end }
      else:
        action: condition
        if: { field: $target, op: eq, value: datadog }
        then:
          call: exportToDatadog
          with: { db: $db, client: $datadogClient, start: $start, end: $end }
        else:
          call: listLlmCalls
          with: { db: $db, timeRange: { start: $start, end: $end } }
output:
  format: "$target"
