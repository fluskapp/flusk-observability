name: drift-scan
description: Run drift detection scan for an agent
options:
  - name: agent
    type: string
    required: true
    description: Agent label to scan
  - name: baseline
    type: string
    description: Baseline period (e.g. "2026-02-01 to 2026-02-15")
  - name: current
    type: string
    description: Current period (e.g. "2026-02-16 to 2026-02-24")
  - name: days
    type: integer
    default: 14
    description: Number of days for each period (auto-calculate if baseline/current not set)
action:
  steps:
    - id: result
      call: runDriftScan
      with:
        agentLabel: "$agent"
        baselinePeriod: "$baseline"
        currentPeriod: "$current"
output:
  format: table
  columns: [agentLabel, detectionType, severity, driftScore, status]
