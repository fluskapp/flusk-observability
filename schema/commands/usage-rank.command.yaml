name: usage-rank
description: Rank users by AI effectiveness
options:
  - name: metric
    type: enum
    values: [prompt-count, token-count, time-saved, cost, acceptance-rate]
    default: time-saved
    description: Metric to rank by
  - name: days
    type: integer
    default: 30
    description: Look back N days
  - name: limit
    type: integer
    default: 10
    description: Top N users
action:
  steps:
    - id: timeRange
      action: compute
      expression: '{ start: now() - ($days * 86400000), end: now() }'
    - id: result
      call: calculateUsageRank
      with:
        timeRange: "$timeRange"
        metricType: "$metric"
output:
  format: table
  columns: [rank, userId, toolName, totalValue]
