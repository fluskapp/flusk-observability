name: budget
description: Manage budget thresholds
options:
  - name: action
    type: enum
    values: [list, set, remove, status]
    default: list
    description: Budget action
  - name: name
    type: string
    description: Budget alert name
  - name: type
    type: enum
    values: [daily, weekly, monthly]
    description: Budget period type
  - name: threshold
    type: number
    description: Threshold in USD
  - name: auto-pause
    type: boolean
    default: false
    description: Auto-pause agents when exceeded
action:
  steps:
    - id: result
      action: condition
      if: { field: $action, op: eq, value: status }
      then:
        call: getBudgetStatus
        with: { db: $db }
      else:
        action: condition
        if: { field: $action, op: eq, value: set }
        then:
          call: createBudgetAlert
          with:
            db: $db
            data:
              name: $name
              budgetType: $type
              thresholdUsd: $threshold
              autoPause: "$auto-pause"
        else:
          call: listBudgetAlerts
          with: { db: $db }
output:
  format: table
  columns: [name, budgetType, thresholdUsd, currentSpendUsd, enabled]
