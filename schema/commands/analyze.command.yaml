name: analyze
description: Run cost analysis on a script — captures LLM calls, detects patterns, generates insights
options:
  - name: script
    type: string
    required: true
    description: Path to the script to analyze
  - name: depth
    type: enum
    values: [quick, full]
    default: full
    description: Analysis depth
action:
  steps:
    - id: session
      call: runAnalysis
      with:
        db: $db
        scriptPath: $script
        start: "session-start"
        end: "session-end"
output:
  format: report
  sections:
    - title: Summary
      fields: [callCount, totalCostUsd, totalTokens, durationMs]
    - title: Patterns Found
      fields: [patternsFound]
    - title: Insights Generated
      fields: [insightsGenerated]
