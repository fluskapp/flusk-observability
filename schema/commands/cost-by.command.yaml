name: cost-by
description: Show cost breakdown by dimension (feature, team, customer)
args:
  - name: dimension
    type: string
    required: true
    description: Dimension to group by (feature, team, customer, model, provider)
options:
  - name: from
    type: string
    description: Start date
  - name: to
    type: string
    description: End date
  - name: limit
    type: number
    default: 20
    description: Max results
action:
  call: getCostByDimension
  with:
    dimension: $dimension
    from: $from
    to: $to
    db: $db
output:
  format: table
  columns: [tagValue, totalCost, callCount, avgCost, percentage]
