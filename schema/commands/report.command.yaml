name: report
description: Generate a cost report for a time period
options:
  - name: period
    type: enum
    values: [day, week, month]
    default: month
    description: Report period
  - name: format
    type: enum
    values: [table, json, csv]
    default: table
    description: Output format
  - name: groupBy
    type: enum
    values: [model, agent, provider]
    default: model
    description: Group costs by
action:
  steps:
    - id: costs
      call: aggregateCosts
      with: { db: $db, groupBy: $groupBy, start: "$period-ago", end: now }
output:
  format: "$format"
  columns: [model, provider, call_count, total_cost, total_tokens]
