name: anthropic
description: Anthropic API client for Claude models
baseUrl: https://api.anthropic.com/v1
auth:
  type: header
  header: x-api-key
  envVar: ANTHROPIC_API_KEY
headers:
  anthropic-version: "2023-06-01"
methods:
  - name: createMessage
    description: Create a message
    http:
      method: POST
      path: /messages
    input:
      model: string
      messages: json
      max_tokens: integer
    output:
      type: json
