name: CostReportScheduler
description: Automatically generate and deliver cost reports on schedule
type: cron
schedule: 0 8 * * 1
steps:
  - id: generateWeekly
    call: generateCostReport
    with:
      reportType: weekly
      format: slack
      db: $db
    action: call
  - id: deliver
    call: dispatchAlert
    with:
      db: $db
      alert: '{"alertType":"cost_anomaly","severity":"info","title":"Weekly Cost Report","message":"$generateWeekly.summary"}'
    action: call
retry:
  maxAttempts: 2
  backoff: exponential
