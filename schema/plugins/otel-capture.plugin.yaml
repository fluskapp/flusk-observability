name: otel-capture
description: OpenTelemetry span capture for LLM calls
type: fastify-plugin
hooks:
  onRequest:
    - action: startSpan
      name: llm-call
      attributes:
        gen_ai.system: $detected.provider
        gen_ai.request.model: $request.body.model
  onResponse:
    - action: endSpan
      attributes:
        gen_ai.usage.input_tokens: $response.usage.prompt_tokens
        gen_ai.usage.output_tokens: $response.usage.completion_tokens
        gen_ai.response.finish_reason: $response.choices[0].finish_reason
        flusk.cost.usd: $middleware.costUsd
        flusk.prompt.hash: $middleware.promptHash
        flusk.prompt.duplicate: $middleware.isDuplicate
options:
  prefix: /v1
