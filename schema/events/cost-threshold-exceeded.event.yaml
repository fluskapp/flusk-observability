name: CostThresholdExceeded
description: Fired when spending exceeds a configured cost threshold
channel: webhook
payload:
  fields:
    - name: budgetId
      type: string
      required: true
    - name: spent
      type: number
      required: true
    - name: limit
      type: number
      required: true
    - name: percentage
      type: number
      required: true
    - name: organizationId
      type: string
      required: true
publish:
  - trigger: manual
subscribe:
  handler: dispatchAlert
  retry:
    maxAttempts: 3
    backoff: exponential
