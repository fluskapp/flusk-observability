name: OptimizationFound
description: Fired when a cost or performance optimization opportunity is found
channel: webhook
payload:
  fields:
    - name: optimizationId
      type: string
      required: true
    - name: optimizationType
      type: string
      required: true
    - name: estimatedSavings
      type: number
      required: true
    - name: organizationId
      type: string
      required: true
publish:
  - trigger: manual
subscribe:
  handler: dispatchAlert
  retry:
    maxAttempts: 3
    backoff: exponential
