name: createSolution
description: Creates a new solution with default configuration
inputs:
  - name: organizationId
    type: string
  - name: name
    type: string
  - name: description
    type: string
  - name: type
    type: string
  - name: db
    type: Database
output:
  type: Solution
steps:
  - id: defaults
    action: assign
    value:
      config: { model: "gpt-4", systemPrompt: "", tools: [] }
      status: draft
      version: "0.1.0"
      metrics: { runs: 0, cost: 0, avg_latency: 0 }
  - id: solution
    call: createSolution
    with:
      data:
        organizationId: $organizationId
        name: $name
        description: $description
        type: $type
        config: $defaults.config
        status: $defaults.status
        version: $defaults.version
        metrics: $defaults.metrics
      db: $db
    store: solution
  - id: result
    action: return
    value: $solution
