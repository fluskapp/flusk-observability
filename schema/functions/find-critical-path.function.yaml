name: findCriticalPath
description: Identify the critical path in a trace (longest sequential chain)
inputs:
  - name: spans
    type: json
output:
  type: json
steps:
  - id: graph
    action: compute
    expression: "buildDependencyGraph($spans)"
  - id: longestPath
    action: compute
    expression: "findLongestPath($graph)"
  - id: result
    action: return
    value:
      spanIds: "$longestPath.spanIds"
      totalDuration: "$longestPath.duration"
