name: checkCircuit
description: Check if spending exceeds circuit breaker thresholds
inputs:
  - name: db
    type: Database
  - name: config
    type: CircuitBreakerConfig
output:
  type: CircuitStatus
steps:
  - id: dailySpend
    call: getDailySpend
    with:
      db: $db
  - id: monthlySpend
    call: getMonthlySpend
    with:
      db: $db
  - id: checkDaily
    action: condition
    if:
      field: $dailySpend
      op: gt
      value: $config.dailyLimit
    then:
      - action: return
        value:
          tripped: true
          reason: daily_limit_exceeded
          actual: $dailySpend
          limit: $config.dailyLimit
  - id: checkMonthly
    action: condition
    if:
      field: $monthlySpend
      op: gt
      value: $config.monthlyLimit
    then:
      - action: return
        value:
          tripped: true
          reason: monthly_limit_exceeded
          actual: $monthlySpend
          limit: $config.monthlyLimit
  - id: ok
    action: return
    value:
      tripped: false
