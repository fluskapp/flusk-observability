name: buildWidgetQuery
description: Translate widget query config into SQL/aggregation and execute
inputs:
  - name: query
    type: json
  - name: timeRange
    type: json
output:
  type: json
steps:
  - id: sql
    action: compute
    expression: |
      SELECT $query.aggregation($query.field) as value
      FROM $query.entity
      WHERE createdAt >= $timeRange.start AND createdAt <= $timeRange.end
      GROUP BY $query.groupBy
  - id: data
    action: query
    sql: "$sql"
  - id: result
    action: return
    value:
      query: "$query"
      data: "$data"
