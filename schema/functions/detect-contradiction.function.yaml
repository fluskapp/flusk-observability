name: detectContradiction
description: Find contradictions within a conversation or across outputs
inputs:
  - name: llmCallId
    type: string
  - name: conversationHistory
    type: json
output:
  type: DelusionResult
steps:
  - id: call
    action: findById
    entity: LlmCall
    id: "$llmCallId"
  - id: analysis
    action: compute
    expression: "findContradictions($conversationHistory, $call)"
  - id: result
    action: return
    value:
      delusionType: contradiction
      confidence: "$call.metadata.confidence"
      divergenceScore: "$analysis.contradictionScore"
      detected: "$analysis.hasContradiction"
      explanation: "$analysis.explanation"
