name: createBudgetAlert_event
description: Create an alert event when a budget is exceeded
inputs:
  - name: db
    type: Database
  - name: budgetAlert
    type: BudgetAlert
  - name: currentSpend
    type: float
output:
  type: AlertEvent
steps:
  - id: alert
    call: dispatchAlert
    with:
      db: $db
      alert:
        alertType: budget_exceeded
        severity: critical
        title: "Budget exceeded: $budgetAlert.name"
        message: "Spending $currentSpend exceeds threshold $budgetAlert.thresholdUsd ($budgetAlert.budgetType)"
  - id: updateBudget
    call: updateBudgetAlert
    with:
      db: $db
      id: $budgetAlert.id
      data:
        currentSpendUsd: $currentSpend
        lastTriggeredAt: now
  - id: result
    action: return
    value: $alert
