name: deploySolution
description: Validates config, sets status to active, creates a new version
inputs:
  - name: solutionId
    type: string
  - name: changelog
    type: string
  - name: publishedBy
    type: string
  - name: db
    type: Database
output:
  type: Solution
steps:
  - id: solution
    call: findSolutionById
    with:
      id: $solutionId
      db: $db
    store: solution
  - id: validate
    action: condition
    if:
      field: $solution.config
      op: eq
      value: null
    then:
      - action: throw
        error: "Solution config is empty — cannot deploy"
  - id: nextVersion
    action: assign
    value: $solution.version
  - id: version
    call: createSolutionVersion
    with:
      data:
        solutionId: $solutionId
        version: $nextVersion
        config: $solution.config
        changelog: $changelog
        publishedBy: $publishedBy
      db: $db
    store: version
  - id: updated
    call: updateSolution
    with:
      id: $solutionId
      data:
        status: active
        publishedAt: $now
      db: $db
    store: updated
  - id: emitDeployed
    call: emitSolutionDeployed
    with:
      solutionId: $solutionId
      version: $nextVersion
  - id: result
    action: return
    value: $updated
