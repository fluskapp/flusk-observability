name: scanCodebase
description: Static analysis to find all LLM call sites in a project
inputs:
  - name: projectPath
    type: string
  - name: scanType
    type: string
output:
  type: CodeScanResult
steps:
  - id: startTime
    action: compute
    expression: "now()"
  - id: callSites
    call: detectLlmCallSites
    with:
      projectPath: "$projectPath"
  - id: costs
    call: estimateCallCosts
    with:
      callSites: "$callSites"
  - id: providers
    action: compute
    expression: "unique($callSites, 'provider')"
  - id: models
    action: compute
    expression: "unique($callSites, 'model')"
  - id: duration
    action: compute
    expression: "now() - $startTime"
  - id: result
    action: create
    entity: CodeScanResult
    data:
      projectPath: "$projectPath"
      scanType: "$scanType"
      totalLlmCalls: "$callSites.length"
      totalProviders: "$providers.length"
      totalModels: "$models.length"
      callSites: "$costs"
      riskScore: "$costs.riskScore"
      scanDuration: "$duration"
  - id: report
    call: generateScanReport
    with:
      scanResult: "$result"
  - id: return
    action: return
    value: "$result"
