name: aggregateUsageByUser
description: Aggregate AI usage metrics per user
inputs:
  - name: userId
    type: string
  - name: timeRange
    type: json
output:
  type: json
steps:
  - id: metrics
    action: findMany
    entity: AiUsageMetric
    where:
      userId: "$userId"
      createdAt:
        gte: "$timeRange.start"
        lte: "$timeRange.end"
  - id: byTool
    action: compute
    expression: "groupBy($metrics, 'toolName')"
  - id: byType
    action: compute
    expression: "groupBy($metrics, 'metricType')"
  - id: result
    action: return
    value:
      userId: "$userId"
      totalMetrics: "$metrics.length"
      byTool: "$byTool"
      byType: "$byType"
