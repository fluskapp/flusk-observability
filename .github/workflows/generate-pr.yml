name: Generate PR
on:
  push:
    branches: [main]
    paths: ['schema/**']
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Install flusk-lang compiler
        run: |
          git clone https://github.com/fluskapp/flusk-lang.git /tmp/flusk-lang
          cd /tmp/flusk-lang/compiler && npm install && npm run build
      - name: Generate code
        run: |
          cd /tmp/flusk-lang/compiler
          node dist/cli.js build --schema-dir $GITHUB_WORKSPACE/schema --out-dir /tmp/generated --target node
      - name: Clone flusk-dev
        run: |
          git clone https://x-access-token:${{ secrets.FLUSK_DEV_TOKEN }}@github.com/adirbenyossef/flusk-dev.git /tmp/flusk-dev
      - name: Copy generated files
        run: |
          # Copy entities
          cp /tmp/generated/node/entities/* /tmp/flusk-dev/packages/entities/src/ 2>/dev/null || true
          cp /tmp/generated/node/types/* /tmp/flusk-dev/packages/types/src/ 2>/dev/null || true
          cp /tmp/generated/node/migrations/* /tmp/flusk-dev/packages/resources/src/sqlite/sql/ 2>/dev/null || true
          cp -r /tmp/generated/node/repositories/* /tmp/flusk-dev/packages/resources/src/sqlite/repositories/ 2>/dev/null || true
          cp /tmp/generated/node/routes/* /tmp/flusk-dev/packages/execution/src/routes/ 2>/dev/null || true
          cp /tmp/generated/node/functions/* /tmp/flusk-dev/packages/business-logic/src/ 2>/dev/null || true
          cp /tmp/generated/node/commands/* /tmp/flusk-dev/packages/cli/src/commands/ 2>/dev/null || true
      - name: Create PR
        run: |
          cd /tmp/flusk-dev
          BRANCH="generated/observability-$(date +%Y%m%d-%H%M%S)"
          git config user.name "flusk-observability[bot]"
          git config user.email "bot@flusk.app"
          git checkout -b $BRANCH
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "feat(observability): auto-generated from flusk-observability schemas"
          git push origin $BRANCH
          gh pr create \
            --repo adirbenyossef/flusk-dev \
            --head $BRANCH \
            --title "feat(observability): auto-generated from schema changes" \
            --body "Auto-generated by flusk-observability CI.\n\nSource: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --label "generated"
        env:
          GH_TOKEN: ${{ secrets.FLUSK_DEV_TOKEN }}
