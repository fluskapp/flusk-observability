components:
  schemas:
    AiUsageMetric:
      type: object
      properties:
        userId:
          type: string
          description: Employee or user identifier
        toolName:
          type: string
          description: Which AI tool (copilot, chatgpt, claude, internal)
        metricType:
          $ref: '#/components/schemas/enum'
          description: Type of metric
          enum:
            - prompt-count
            - token-count
            - time-saved
            - cost
            - acceptance-rate
        value:
          type: number
          description: Metric value
        period:
          type: string
          description: Period identifier (e.g. "2026-02-24" or "2026-W08")
        periodType:
          $ref: '#/components/schemas/enum'
          description: Granularity of the period
          enum:
            - daily
            - weekly
            - monthly
        metadata:
          type: object
          description: Extra context (project, language, task type)
      required:
        - userId
        - toolName
        - metricType
        - value
        - period
        - periodType
        - metadata
      description: AI tool usage metrics per user for tracking adoption and ROI
    AlertChannel:
      type: object
      properties:
        name:
          type: string
          description: Human-readable channel name
        channelType:
          $ref: '#/components/schemas/enum'
          description: Alert provider type
          enum:
            - pagerduty
            - slack
            - discord
            - webhook
            - email
        config:
          type: object
          description: Provider-specific configuration (routing_key, webhook_url, etc.)
        enabled:
          type: boolean
          description: Whether this channel is active
        severityFilter:
          $ref: '#/components/schemas/enum'
          description: Minimum severity level to trigger alerts on this channel
          enum:
            - critical
            - warning
            - info
      required:
        - name
        - channelType
        - config
        - enabled
        - severityFilter
      description: Configuration for an alert destination (PagerDuty, Slack, etc.)
    AlertEvent:
      type: object
      properties:
        alertType:
          $ref: '#/components/schemas/enum'
          description: Type of alert
          enum:
            - budget_exceeded
            - budget_warning
            - drift_detected
            - cost_anomaly
            - agent_stalled
            - error_rate_spike
            - token_rate_limit
        severity:
          $ref: '#/components/schemas/enum'
          description: Alert severity level
          enum:
            - critical
            - warning
            - info
        title:
          type: string
          description: Short alert title
        message:
          type: string
          description: Detailed alert message
        channelName:
          type: string
          description: Which alert channel delivered this
        delivered:
          type: boolean
          description: Whether the alert was successfully delivered
        acknowledgedAt:
          type: string
          description: ISO datetime when acknowledged
        metadata:
          type: object
          description: Additional context
      required:
        - alertType
        - severity
        - title
        - message
        - channelName
        - delivered
        - acknowledgedAt
        - metadata
      description: Record of an alert that was triggered
    AnalyzeSession:
      type: object
      properties:
        scriptPath:
          type: string
          description: Path to the analyzed script
        status:
          $ref: '#/components/schemas/enum'
          description: Session status
          enum:
            - running
            - completed
            - failed
        callCount:
          type: integer
          description: Number of LLM calls captured
        totalCostUsd:
          type: number
          description: Total cost of all calls in session
        totalTokens:
          type: integer
          description: Total tokens used
        durationMs:
          type: integer
          description: Total analysis duration
        patternsFound:
          type: integer
          description: Number of patterns detected
        insightsGenerated:
          type: integer
          description: Number of insights generated
        summary:
          type: object
          description: Summary results of the analysis
      required:
        - scriptPath
        - status
        - callCount
        - totalCostUsd
        - totalTokens
        - durationMs
        - patternsFound
        - insightsGenerated
        - summary
      description: Tracks CLI analyze command runs
    ApiKey:
      type: object
      properties:
        key:
          type: string
          description: SHA-256 hashed key (never store plaintext)
        prefix:
          type: string
          description: First 8 chars of key for display
        name:
          type: string
          description: Human-readable key name
        organizationId:
          type: string
          description: Owning organization
        userId:
          type: string
          description: User who created the key
        scopes:
          type: object
          description: Allowed scopes, e.g. ["ingest","read","admin"]
        expiresAt:
          type: string
          description: Key expiration timestamp
        lastUsedAt:
          type: string
          description: Last time the key was used
        status:
          $ref: '#/components/schemas/enum'
          description: Key status
          enum:
            - active
            - revoked
      required:
        - key
        - prefix
        - name
        - organizationId
        - userId
        - scopes
        - expiresAt
        - lastUsedAt
        - status
      description: Hashed API key for programmatic access
    AuditLog:
      type: object
      properties:
        organizationId:
          type: string
          description: Organization context
        userId:
          type: string
          description: User who performed the action
        action:
          type: string
          description: Action performed (e.g. api_key.create, user.invite)
        resource:
          type: string
          description: Resource type (e.g. ApiKey, User, Organization)
        resourceId:
          type: string
          description: ID of the affected resource
        metadata:
          type: object
          description: Additional context about the action
        ipAddress:
          type: string
          description: Client IP address
      required:
        - organizationId
        - userId
        - action
        - resource
        - resourceId
        - metadata
        - ipAddress
      description: Immutable audit trail of actions within an organization
    BudgetAlert:
      type: object
      properties:
        name:
          type: string
          description: Alert name
        budgetType:
          $ref: '#/components/schemas/enum'
          description: Budget period type
          enum:
            - daily
            - weekly
            - monthly
        thresholdUsd:
          type: number
          description: Spending threshold in USD
        warningPercent:
          type: integer
          description: Percentage of threshold to trigger warning
        currentSpendUsd:
          type: number
          description: Current spend in this period
        enabled:
          type: boolean
          description: Whether this alert is active
        autoPause:
          type: boolean
          description: Auto-pause agents when exceeded
        lastTriggeredAt:
          type: string
          description: ISO datetime of last trigger
        agentFilter:
          type: string
          description: Optional agent name filter (null = all agents)
      required:
        - name
        - budgetType
        - thresholdUsd
        - warningPercent
        - currentSpendUsd
        - enabled
        - autoPause
        - lastTriggeredAt
        - agentFilter
      description: Budget threshold alert configuration
    CircuitBreakerConfig:
      type: object
      properties:
        data:
          type: object
          description: CircuitBreakerConfig data
      required:
        - data
      description: CircuitBreakerConfig
    CodeScanResult:
      type: object
      properties:
        projectPath:
          type: string
          description: Scanned project path
        scanType:
          $ref: '#/components/schemas/enum'
          description: Type of scan performed
          enum:
            - static
            - runtime
            - hybrid
        totalLlmCalls:
          type: integer
          description: Number of LLM call sites found
        totalProviders:
          type: integer
          description: Unique providers detected
        totalModels:
          type: integer
          description: Unique models detected
        callSites:
          type: object
          description: Array of {file, line, provider, model, estimatedCost}
        recommendations:
          type: object
          description: Optimization recommendations
        riskScore:
          type: number
          description: Overall AI risk score (0-1)
        scanDuration:
          type: integer
          description: Scan time in milliseconds
      required:
        - projectPath
        - scanType
        - totalLlmCalls
        - totalProviders
        - totalModels
        - callSites
        - recommendations
        - riskScore
        - scanDuration
      description: Results from scanning a codebase for LLM/AI usage patterns
    Conversion:
      type: object
      properties:
        conversionType:
          $ref: '#/components/schemas/enum'
          description: Type of optimization
          enum:
            - cache
            - downgrade
            - remove
        sourceModel:
          type: string
          description: Current model being used
        targetModel:
          type: string
          description: Suggested replacement model (for downgrade)
        promptHash:
          type: string
          description: Prompt hash this conversion applies to
        promptCategory:
          type: string
          description: Prompt category
        estimatedSavingsUsd:
          type: number
          description: Projected monthly savings
        confidence:
          type: number
          description: Confidence score 0-1
        status:
          $ref: '#/components/schemas/enum'
          description: Conversion status
          enum:
            - pending
            - accepted
            - rejected
            - applied
        appliedAt:
          type: string
          description: When the conversion was applied
        metadata:
          type: object
          description: Additional context
      required:
        - conversionType
        - sourceModel
        - targetModel
        - promptHash
        - promptCategory
        - estimatedSavingsUsd
        - confidence
        - status
        - appliedAt
        - metadata
      description: Optimization suggestion — cache, downgrade, or remove an LLM call
    CostAttribution:
      type: object
      properties:
        llmCallId:
          type: string
          description: Reference to the LLM call
        tagKey:
          type: string
          description: Dimension (feature, team, customer)
        tagValue:
          type: string
          description: Value (support-bot, engineering, acme-corp)
        costUsd:
          type: number
          description: Cost attributed to this tag
        inputTokens:
          type: integer
          description: Input tokens for this call
        outputTokens:
          type: integer
          description: Output tokens for this call
        model:
          type: string
          description: Model used
        provider:
          type: string
          description: Provider (openai, anthropic)
      required:
        - llmCallId
        - tagKey
        - tagValue
        - costUsd
        - inputTokens
        - outputTokens
        - model
        - provider
      description: Links an LLM call to cost tags for attribution tracking
    CostBudget:
      type: object
      properties:
        tagKey:
          type: string
          description: Which dimension (feature, team, customer)
        tagValue:
          type: string
          description: Which value (support-bot, engineering)
        limitUsd:
          type: number
          description: Budget limit in USD
        period:
          $ref: '#/components/schemas/enum'
          description: Budget period
          enum:
            - daily
            - weekly
            - monthly
        alertAt:
          type: number
          description: Alert when reaching this percentage of budget
        action:
          $ref: '#/components/schemas/enum'
          description: What to do when budget exceeded
          enum:
            - alert
            - throttle
            - block
        enabled:
          type: boolean
      required:
        - tagKey
        - tagValue
        - limitUsd
        - period
        - alertAt
        - action
        - enabled
      description: Budget limit for a specific tag (e.g. team=engineering has $500/month budget)
    CostReport:
      type: object
      properties:
        reportType:
          $ref: '#/components/schemas/enum'
          description: Report type
          enum:
            - daily
            - weekly
            - monthly
            - custom
        periodStart:
          type: string
          description: Period start ISO datetime
        periodEnd:
          type: string
          description: Period end ISO datetime
        totalCostUsd:
          type: number
          description: Total cost in this period
        totalCalls:
          type: integer
          description: Total LLM calls
        breakdown:
          type: object
          description: Full breakdown by all dimensions
        topInsights:
          type: object
          description: Auto-generated insights (spikes, anomalies, savings opportunities)
        format:
          $ref: '#/components/schemas/enum'
          enum:
            - json
            - html
            - slack
            - markdown
      required:
        - reportType
        - periodStart
        - periodEnd
        - totalCostUsd
        - totalCalls
        - breakdown
        - topInsights
        - format
      description: Generated cost attribution report snapshot
    CostTag:
      type: object
      properties:
        key:
          type: string
          description: Tag dimension (feature, team, customer, environment, project)
        value:
          type: string
          description: Tag value (support-bot, engineering, acme-corp)
        description:
          type: string
          description: Human-readable description of this tag
      required:
        - key
        - value
        - description
      description: Tag for attributing LLM costs to features, teams, customers, or any dimension
    DashboardWidget:
      type: object
      properties:
        dashboardId:
          type: string
          description: Parent dashboard ID
        widgetType:
          $ref: '#/components/schemas/enum'
          description: Type of visualization widget
          enum:
            - line-chart
            - bar-chart
            - pie-chart
            - metric-card
            - table
            - heatmap
            - waterfall
            - timeline
        title:
          type: string
          description: Widget display title
        query:
          type: object
          description: Data query config (entity, aggregation, groupBy, timeRange)
        position:
          type: object
          description: Grid position {x, y, w, h}
        config:
          type: object
          description: Widget-specific config (colors, thresholds, labels)
        refreshOverride:
          type: integer
          description: Override dashboard refresh interval for this widget
      required:
        - dashboardId
        - widgetType
        - title
        - query
        - position
        - config
        - refreshOverride
      description: Individual widget within a dashboard
    Dashboard:
      type: object
      properties:
        name:
          type: string
          description: Dashboard name
        description:
          type: string
          description: What this dashboard shows
        layout:
          type: object
          description: Grid layout config (widgets, positions, sizes)
        filters:
          type: object
          description: Default filters (time range, model, agent)
        refreshInterval:
          type: integer
          description: Auto-refresh interval in seconds
        isDefault:
          type: boolean
          description: Show on home page
        owner:
          type: string
          description: Who created this dashboard
      required:
        - name
        - description
        - layout
        - filters
        - refreshInterval
        - isDefault
        - owner
      description: Configurable dashboard for visualizing observability data
    DatadogClient:
      type: object
      properties:
        data:
          type: object
          description: DatadogClient data
      required:
        - data
      description: DatadogClient
    DelusionDetection:
      type: object
      properties:
        agentLabel:
          type: string
          description: Which agent produced the delusional output
        llmCallId:
          type: string
          description: Specific LLM call that was delusional
        delusionType:
          $ref: '#/components/schemas/enum'
          description: Type of delusion detected
          enum:
            - hallucination
            - contradiction
            - confidence-mismatch
            - circular-reasoning
            - fabricated-reference
        confidence:
          type: number
          description: Model's stated confidence (0-1)
        actualAccuracy:
          type: number
          description: Verified accuracy (0-1)
        divergenceScore:
          type: number
          description: Confidence minus accuracy
        inputSample:
          type: string
          description: The input that triggered the delusional output
        outputSample:
          type: string
          description: The delusional output
        explanation:
          type: string
          description: Why this was flagged as delusional
        verified:
          type: boolean
          description: Whether a human has verified this detection
        status:
          $ref: '#/components/schemas/enum'
          description: Current status
          enum:
            - detected
            - confirmed
            - dismissed
      required:
        - agentLabel
        - llmCallId
        - delusionType
        - confidence
        - actualAccuracy
        - divergenceScore
        - inputSample
        - outputSample
        - explanation
        - verified
        - status
      description: Detected hallucination or confidence mismatch in LLM output
    DriftDetection:
      type: object
      properties:
        agentLabel:
          type: string
          description: Which agent is being monitored
        detectionType:
          $ref: '#/components/schemas/enum'
          description: Type of drift detected
          enum:
            - output-drift
            - confidence-drift
            - latency-drift
            - cost-drift
            - behavior-drift
        severity:
          $ref: '#/components/schemas/enum'
          description: Severity level
          enum:
            - critical
            - high
            - medium
            - low
        baselineHash:
          type: string
          description: Hash of baseline behavior
        currentHash:
          type: string
          description: Hash of current behavior
        driftScore:
          type: number
          description: Drift score from 0 to 1
        sampleCount:
          type: integer
          description: Number of samples analyzed
        baselinePeriod:
          type: string
          description: Baseline time period (e.g. "2026-02-01 to 2026-02-15")
        currentPeriod:
          type: string
          description: Current time period (e.g. "2026-02-16 to 2026-02-24")
        details:
          type: object
          description: Specific drift details (changed outputs, new patterns)
        status:
          $ref: '#/components/schemas/enum'
          description: Current status of this detection
          enum:
            - active
            - acknowledged
            - resolved
            - false-positive
      required:
        - agentLabel
        - detectionType
        - severity
        - baselineHash
        - currentHash
        - driftScore
        - sampleCount
        - baselinePeriod
        - currentPeriod
        - details
        - status
      description: Detected behavioral or performance drift in an agent
    DriftResult:
      type: object
      properties:
        data:
          type: object
          description: DriftResult data
      required:
        - data
      description: DriftResult
    ExplainSession:
      type: object
      properties:
        query:
          type: string
          description: User's question or topic
        status:
          $ref: '#/components/schemas/enum'
          description: Session status
          enum:
            - running
            - completed
            - failed
        model:
          type: string
          description: LLM model used for explanation
        responseText:
          type: string
          description: Generated explanation
        callsAnalyzed:
          type: integer
          description: Number of calls analyzed for context
        costOfExplain:
          type: number
          description: Cost of running the explain query itself
        durationMs:
          type: integer
          description: How long the explain took
      required:
        - query
        - status
        - model
        - responseText
        - callsAnalyzed
        - costOfExplain
        - durationMs
      description: Tracks flusk explain command runs — AI-powered cost optimization insights
    GrafanaTempoClient:
      type: object
      properties:
        data:
          type: object
          description: GrafanaTempoClient data
      required:
        - data
      description: GrafanaTempoClient
    Insight:
      type: object
      properties:
        insightType:
          $ref: '#/components/schemas/enum'
          description: Type of insight
          enum:
            - cost_reduction
            - performance
            - caching
            - model_switch
            - pattern_elimination
            - quality_improvement
        title:
          type: string
          description: Short insight title
        description:
          type: string
          description: Detailed explanation
        estimatedSavingsUsd:
          type: number
          description: Projected monthly savings
        estimatedSavingsPercent:
          type: number
          description: Projected savings as percentage
        priority:
          $ref: '#/components/schemas/enum'
          description: Priority level
          enum:
            - high
