          description: Total trace duration in milliseconds
        spanCount:
          type: integer
          description: Number of spans in this trace
        totalCostUsd:
          type: number
          description: Sum of all LLM call costs within this trace
        status:
          $ref: '#/components/schemas/enum'
          description: Trace outcome status
          enum:
            - ok
            - error
            - timeout
        metadata:
          type: object
          description: Additional trace attributes
      required:
        - traceId
        - rootSpanId
        - serviceName
        - operationName
        - durationMs
        - spanCount
        - totalCostUsd
        - status
        - metadata
      description: Distributed trace record grouping related spans
    User:
      type: object
      properties:
        organizationId:
          type: string
          description: Parent organization
        email:
          type: string
          description: User email address
        name:
          type: string
          description: Display name
        role:
          $ref: '#/components/schemas/enum'
          description: Access role within organization
          enum:
            - owner
            - admin
            - member
            - viewer
        status:
          $ref: '#/components/schemas/enum'
          description: Account status
          enum:
            - active
            - invited
            - suspended
        lastLoginAt:
          type: string
          description: Last login timestamp
      required:
        - organizationId
        - email
        - name
        - role
        - status
        - lastLoginAt
      description: Organization member with role-based access
    Webhook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          description: Human-readable webhook name
        url:
          type: string
          description: Target URL for webhook delivery
        method:
          type: string
          enum:
            - POST
            - PUT
            - PATCH
        headers:
          type: object
          description: Custom HTTP headers as key-value pairs
        payloadTemplate:
          type: string
          description: Mustache/handlebars template for payload body
        retryMaxAttempts:
          type: integer
          description: Maximum retry attempts on failure
        retryDelayMs:
          type: integer
          description: Delay between retries in milliseconds
        retryBackoffMultiplier:
          type: number
          description: Exponential backoff multiplier
        timeoutMs:
          type: integer
          description: Request timeout in milliseconds
        secret:
          type: string
          description: HMAC secret for signature verification
        enabled:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - url
        - method
        - enabled
        - createdAt
        - updatedAt
      description: Webhook delivery configuration for reports and alerts
